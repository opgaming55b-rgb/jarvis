<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS AI - Advanced Assistant</title>
    <style>
        :root {
            --glow-cyan: #00f2ff;
            --glow-red: #ff003c;
            --bg-dark: #050505;
            --panel-bg: rgba(20, 20, 20, 0.9);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        /* --- Setup Panel --- */
        #setup-panel {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--glow-cyan);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
            z-index: 100;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: var(--glow-cyan); margin-bottom: 8px; font-size: 0.8rem; }
        
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--glow-cyan); box-shadow: 0 0 10px var(--glow-cyan); }

        .btn-prime {
            background: transparent;
            border: 1px solid var(--glow-cyan);
            color: var(--glow-cyan);
            padding: 12px 30px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-prime:hover { background: var(--glow-cyan); color: black; box-shadow: 0 0 20px var(--glow-cyan); }

        /* --- Main Jarvis UI --- */
        #main-ui { display: none; text-align: center; width: 100%; }

        .arc-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }

        .arc-reactor {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--glow-cyan);
            box-shadow: 0 0 25px var(--glow-cyan), inset 0 0 25px var(--glow-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--glow-cyan);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        #status-text {
            font-size: 1.2rem;
            color: var(--glow-cyan);
            text-shadow: 0 0 10px var(--glow-cyan);
            margin: 20px 0;
            letter-spacing: 3px;
        }

        .chat-box {
            max-width: 600px;
            margin: 0 auto;
            height: 150px;
            overflow-y: auto;
            padding: 20px;
            font-size: 1rem;
            line-height: 1.6;
            border-left: 2px solid var(--glow-cyan);
            background: rgba(255, 255, 255, 0.02);
            text-align: left;
        }

        .user-line { color: #888; margin-bottom: 5px; }
        .jarvis-line { color: var(--glow-cyan); font-weight: bold; margin-bottom: 15px; }

        .controls { margin-top: 30px; }
        .btn-reset { color: var(--glow-red); border: 1px solid var(--glow-red); background: transparent; padding: 8px 15px; cursor: pointer; border-radius: 5px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-panel">
        <h1 style="color: var(--glow-cyan); margin-bottom: 30px;">JARVIS SETUP</h1>
        
        <div class="input-group">
            <label>OPENAI API KEY</label>
            <input type="password" id="api-key-input" placeholder="sk-...">
        </div>

        <div class="input-group">
            <label>ASSISTANT NAME</label>
            <input type="text" id="name-input" placeholder="e.g. Jarvis" value="Jarvis">
        </div>

        <button class="btn-prime" onclick="saveAndContinue()">Save & Continue</button>
    </div>

    <!-- Main App Screen -->
    <div id="main-ui">
        <div class="arc-container">
            <div class="pulse-ring" id="pulse"></div>
            <div class="arc-reactor" id="reactor">
                <img src="https://cdn-icons-png.flaticon.com/512/625/625150.png" style="width: 80px; filter: invert(1) sepia(1) saturate(5) hue-rotate(170deg);" alt="Jarvis Core">
            </div>
        </div>

        <div id="status-text">SYSTEM STANDBY</div>

        <div class="chat-box" id="chat-box">
            <div class="jarvis-line">Jarvis: Online. Waiting for wake word...</div>
        </div>

        <div class="controls">
            <button class="btn-reset" onclick="resetSettings()">RESET SYSTEM</button>
        </div>
    </div>

    <script>
        // --- Globals ---
        let recognition;
        let isProcessing = false;
        let assistantName = localStorage.getItem('jarvis_name') || 'Jarvis';
        let apiKey = localStorage.getItem('jarvis_api_key');

        const setupPanel = document.getElementById('setup-panel');
        const mainUi = document.getElementById('main-ui');
        const statusText = document.getElementById('status-text');
        const chatBox = document.getElementById('chat-box');

        // --- Init Function ---
        window.onload = async () => {
            requestMicPermission();
            
            if (apiKey) {
                showMainUI();
            }
        };

        async function requestMicPermission() {
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log("Mic permission granted");
            } catch (err) {
                alert("Mic permission allow kare bina Jarvis kaam nahi karega!");
            }
        }

        function saveAndContinue() {
            const key = document.getElementById('api-key-input').value.trim();
            const name = document.getElementById('name-input').value.trim();

            if (!key) {
                alert("Please enter API Key!");
                return;
            }

            localStorage.setItem('jarvis_api_key', key);
            localStorage.setItem('jarvis_name', name || 'Jarvis');
            apiKey = key;
            assistantName = name || 'Jarvis';

            alert("API Key Saved Successfully!");
            showMainUI();
        }

        function showMainUI() {
            setupPanel.style.display = 'none';
            mainUi.style.display = 'block';
            startJarvisEngine();
        }

        function resetSettings() {
            localStorage.clear();
            location.reload();
        }

        // --- Jarvis Voice Engine ---

        function startJarvisEngine() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Browser not supported!");
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.lang = 'hi-IN';
            recognition.interimResults = false;

            recognition.onstart = () => {
                updateStatus("Listening...");
            };

            recognition.onerror = (event) => {
                console.error("Mic Error:", event.error);
                if (event.error === 'not-allowed') {
                    alert("Mic permission error!");
                }
            };

            recognition.onend = () => {
                // Keep Jarvis always listening
                recognition.start();
            };

            recognition.onresult = (event) => {
                const current = event.resultIndex;
                const transcript = event.results[current][0].transcript.toLowerCase();
                
                handleVoiceInput(transcript);
            };

            recognition.start();
        }

        function updateStatus(text, color = "var(--glow-cyan)") {
            statusText.innerText = text;
            statusText.style.color = color;
            const pulse = document.getElementById('pulse');
            pulse.style.borderColor = color;
        }

        function appendChat(role, text) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'user-line' : 'jarvis-line';
            div.innerText = (role === 'user' ? 'You: ' : `${assistantName}: `) + text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- Logical Processing ---

        async function handleVoiceInput(cmd) {
            if (isProcessing) return;

            // Wake word check
            if (cmd.includes(assistantName.toLowerCase())) {
                appendChat('user', cmd);
                
                // Local Commands check
                if (cmd.includes('youtube') || cmd.includes('यूट्यूब')) {
                    speak("यूट्यूब खोल रहा हूँ।");
                    window.open("https://youtube.com", "_blank");
                } 
                else if (cmd.includes('google') || cmd.includes('गूगल')) {
                    speak("गूगल खोल रहा हूँ।");
                    window.open("https://google.com", "_blank");
                } 
                else if (cmd.includes('समय') || cmd.includes('time')) {
                    const now = new Date().toLocaleTimeString('hi-IN');
                    speak(`अभी समय हुआ है ${now}`);
                } 
                else {
                    // Send to AI
                    await callAI(cmd);
                }
            }
        }

        async function callAI(prompt) {
            if (!apiKey) {
                speak("API key pehle daalo settings mein.");
                return;
            }

            isProcessing = true;
            updateStatus("Processing...", "yellow");

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [
                            { role: "system", content: `Tum ek smart AI assistant ho jiska naam ${assistantName} hai. Tum hamesha Hindi me baat karte ho. Short aur clear jawab dete ho. Friendly aur futuristic tone rakho.` },
                            { role: "user", content: prompt }
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiReply = data.choices[0].message.content;
                appendChat('jarvis', aiReply);
                speak(aiReply);

            } catch (err) {
                console.error(err);
                speak("माफ़ कीजिये, API काम नहीं कर रहा।");
                updateStatus("API ERROR", "var(--glow-red)");
            } finally {
                isProcessing = false;
            }
        }

        // --- Text to Speech ---

        function speak(text) {
            // Stop current speech
            window.speechSynthesis.cancel();
            
            updateStatus("Speaking...");
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            utterance.rate = 1.0;

            utterance.onend = () => {
                updateStatus("Listening...");
            };

            window.speechSynthesis.speak(utterance);
        }

    </script>
</body>
</html>
